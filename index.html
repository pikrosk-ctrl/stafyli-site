<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-stafyli | Προσεχώς</title>
    <style>
        /* Γήινη Παλέτα Χρωμάτων */
        body { 
            background-color: #f5f2d0; /* Άτονο κίτρινο/μπεζ της άμμου */
            color: #3e4a21; /* Βαθύ πράσινο της ελιάς */
            font-family: 'Georgia', serif; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            border: 2px solid #a3b18a; /* Ανοιχτό πράσινο του φασκόμηλου */
            padding: 40px;
            border-radius: 15px;
            background-color: #ffffff66; /* Ημιδιάφανο λευκό για βάθος */
        }

        .logo { font-size: 100px; margin-bottom: 10px; }

        h1 { 
            font-size: 3.5em; 
            margin: 0; 
            color: #606c38; /* Πράσινο του δάσους */
            letter-spacing: 2px;
        }

        p { 
            font-size: 1.4em; 
            max-width: 500px; 
            margin: 20px auto;
            line-height: 1.6;
            font-style: italic;
        }

        .divider {
            width: 100px;
            height: 3px;
            background-color: #bc6c25; /* Γήινο καφέ/τερακότα για αντίθεση */
            margin: 20px auto;
        }

        .status {
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #283618;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">🍇</div>
        <h1>e-stafyli</h1>
        <div class="divider"></div>
        <p>Αυθεντικές γεύσεις από το αμπέλι, κατευθείαν στην πόρτα σας.</p>
        <div class="status">Έρχεται Σύντομα</div>
    </div>

</body>
</html>
