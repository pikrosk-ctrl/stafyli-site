<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Η Πρώτη μου Δοκιμή</title>
    <style>
        /* Εδώ βάζουμε τα χρώματα (CSS) */
        body {
            background-color: #f5f2d0; /* Το άτονο κίτρινο που σου αρέσει */
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 50px;
        }

        .to-kouti-mou {
            background-color: #436129; /* Το πράσινο που διάλεξες */
            color: white;              /* Άσπρα γράμματα για να διαβάζονται */
            width: 400px;              /* Πόσο πλατύ θα είναι το κουτί */
            padding: 30px;             /* Πόσο «αέρα» θα έχει μέσα */
            border-radius: 15px;       /* Στρογγυλεμένες γωνίες */
            margin: 0 auto;            /* Αυτό το βάζει ακριβώς στη μέση της οθόνης */
        }

        h1 {
            margin-top: 0;
        }

        .koumpi {
            background-color: #e6d194; /* Κίτρινο κουμπί */
            color: #436129;            /* Πράσινα γράμματα στο κουμπί */
            padding: 10px 20px;
            text-decoration: none;     /* Βγάζει την υπογράμμιση από το link */
            font-weight: bold;
            border-radius: 5px;
            display: inline-block;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="to-kouti-mou">
        <h1>Καλώς ήρθατε!</h1>
        <p>Αυτό είναι το πρώτο μου κουτί. Μαθαίνω πώς να βάζω χρώματα και να οργανώνω τον κώδικα.</p>
        <a href="#" class="koumpi">Πάτα με</a>
        <img src="stafyli.jpg" style="width: 100%; border-radius: 10px; margin-top: 15px;">
    </div>

</body>
</html>
