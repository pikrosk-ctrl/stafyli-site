<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Η Πρώτη μου Δοκιμή</title>
    <style>
        /* --- Εδώ βάζουμε τα χρώματα (CSS) --- */
        body {
            background-color: #f5f2d0;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 30px;
        }

        /* Τα χρώματα του πράσινου κουτιού */
        .to-kouti-mou {
            background-color: #436129;
            color: white;
            width: 400px;
            padding: 30px;
            border-radius: 15px;
            margin: 0 auto;
        }

        h1 { margin-top: 0; }

        /* Τα χρώματα του κουμπιού */
        .koumpi {
            background-color: #e6d194;
            color: #436129;
            padding: 10px 20px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            display: inline-block;
            margin-top: 20px;
        }

        /* --- Χρώματα και διάταξη για το Κεντρικό Μενού --- */
        .kentriko-menou ul {
            list-style-type: none; 
            margin: 0 auto 30px auto; /* Το 30px αφήνει κενό κάτω από το μενού */
            padding: 0;
            background-color: #436129; 
            text-align: center;
            border-radius: 8px; 
            width: 800px; /* Πόσο πλατύ θα είναι το μενού */
        }

        .kentriko-menou li {
            display: inline-block; 
        }

        .kentriko-menou li a {
            display: block;
            color: white;
            text-align: center;
            padding: 15px 20px;
            text-decoration: none; 
            font-weight: bold;
        }

        .kentriko-menou li a:hover {
            background-color: #e6d194; 
            color: #436129;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <nav class="kentriko-menou">
        <ul>
            <li><a href="#">Το Κλήμα & Η Γη</a></li>
            <li><a href="#">Ιστορία</a></li>
            <li><a href="#">Η Επεξεργασία</a></li>
            <li><a href="#">Προϊόντα</a></li>
            <li><a href="#">Δελέρια Τυρνάβου</a></li>
        </ul>
    </nav>

    <div class="to-kouti-mou">
        <h1>Καλώς ήρθατε!</h1>
        <p>Αυτό είναι το πρώτο μου κουτί. Μαθαίνω πώς να βάζω χρώματα και να οργανώνω τον κώδικα.</p>
        
        <img src="stafyli.jpg" style="width: 100%; border-radius: 10px; margin-top: 15px;">
        
        <a href="#" class="koumpi">Πάτα με</a>
    </div>

</body>
</html>
